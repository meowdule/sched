# Pages 배포는 보통 25~50초 정도가 흔합니다.
# - 러너 시작·checkout·npm ci(캐시 미스 시 더 김)·빌드·아티팩트 업로드
# - deploy 잡이 별도 VM에서 Pages API까지 처리
# CI에서는 tsc 생략(vite만)으로 로컬 `npm run build`보다 조금 단축합니다.
#
# 앱이 Contents API로 data/events.json을 저장할 때마다 main에 커밋이 생깁니다.
# 그 push까지 배포 트리거로 잡으면 일정 저장할 때마다 Actions가 돌아가므로,
# data/** 만 바뀐 커밋은 paths-ignore로 배포에서 제외합니다(앱은 런타임에 API로 읽음).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install and build
        run: npm ci && npm run build:ci
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_GITHUB_OWNER: ${{ github.repository_owner }}
          VITE_GITHUB_REPO: ${{ github.event.repository.name }}
          VITE_GITHUB_BRANCH: main
          VITE_DATA_PATH: data/events.json
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
